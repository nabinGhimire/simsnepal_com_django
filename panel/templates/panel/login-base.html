{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A fully featured admin theme which can be used to build CRM, CMS, etc.">
        <meta name="author" content="Coderthemes">

        <!-- App favicon -->
        <link rel="shortcut icon" href="images/favicon.ico">
        <!-- App title -->
        <title>{% block title %} {% endblock title %}</title>

        <!-- App css -->
        <link href="{% static "css/bootstrap.min.css" %}"rel="stylesheet" type="text/css" />
        <link href="{% static "css/core.css" %}" rel="stylesheet" type="text/css" />
        <link href="{% static "css/components.css" %}" rel="stylesheet" type="text/css" />
        <link href="{% static "css/icons.css" %}" rel="stylesheet" type="text/css" />
        <link href="{% static "css/pages.css" %}" rel="stylesheet" type="text/css" />
        <link href="{% static "css/menu.css" %}" rel="stylesheet" type="text/css" />
        <link href="{% static "css/responsive.css" %}" rel="stylesheet" type="text/css" />

        <!-- HTML5 Shiv and Respond.js IE8 support of HTML5 elements and media queries -->
        <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
        <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
        <script src="https://oss.maxcdn.com/libs/respond.js/1.3.0/respond.min.js"></script>
        <![endif]-->

        <script src="{% static "js/modernizr.min.js" %}"></script>
        <!-- Global site tag (gtag.js) - Google Analytics -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=UA-142374714-1"></script>
        <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());

          gtag('config', 'UA-142374714-1');
        </script>


    </head>
    <body class="bg-transparent">

      {% block content %}

      {% endblock content %}

      <script>
          var resizefunc = [];
      </script>

      <!-- jQuery  -->
      <script src="{% static "js/jquery.min.js" %}"></script>
      <script src="{% static "js/bootstrap.min.js" %}"></script>
      <script src="{% static "js/detect.js" %}"></script>
      <script src="{% static "js/fastclick.js" %}"></script>
      <script src="{% static "js/jquery.blockUI.js" %}"></script>
      <script src="{% static "js/waves.js" %}"></script>
      <script src="{% static "js/jquery.slimscroll.js" %}"></script>
      <script src="{% static "js/jquery.scrollTo.min.js" %}"></script>

      <!-- App js -->
      <script src="{% static "js/jquery.core.js" %}"></script>
      <script src="{% static "js/jquery.app.js" %}"></script>

    </body>
</html>
