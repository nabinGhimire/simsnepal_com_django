{% extends 'gpanel/login-base.html' %}
{% block title %} Lock Screen- Hamro Panel | Hamro.com {% endblock title %}
{% load static %}
{% block content %}

        <!-- HOME -->
        <section>
            <div class="container-alt">
                <div class="row">
                    <div class="col-sm-12">

                        <div class="wrapper-page">

                            <div class="m-t-40 account-pages">
                                <div class="text-center account-logo-box">
                                    <h2 class="text-uppercase">
                                        <a href="#" class="text-success">
                                            <span><img src="{% static "images/logo.svg" %}" alt="" height="36"></span>
                                        </a>
                                    </h2>
                                    <!--<h4 class="text-uppercase font-bold m-b-0">Sign In</h4>-->
                                </div>
                                <div class="account-content">
                                    <div class="text-center m-b-20">
                                        <div class="m-b-20">
                                            <img src="{% static "images/users/avatar-female.png" %}" class="img-circle img-thumbnail thumb-lg" alt="thumbnail">
                                        </div>

                                        <p class="text-muted m-b-0 font-13">Hello <strong>{{ username }}</strong>,<br> Enter your password to access the Panel. </p>
                                    </div>
                                    <form class="form-horizontal" action="/gpanel/login/" method="POST">
                                        {% csrf_token %}
                                        <input type="hidden" name="username" value="{{ username }}" id="id_username">
                                        <div class="form-group">
                                            <div class="col-xs-12">
                                                <input class="form-control" type="password" id="id_password" name="password" required=""
                                                       placeholder="Password">
                                            </div>
                                        </div>

                                        <div class="form-group account-btn text-center m-t-10">
                                            <div class="col-xs-12">
                                                <button class="btn w-md btn-bordered btn-danger waves-effect waves-light"
                                                        type="submit">Log In
                                                </button>
                                            </div>
                                        </div>

                                    </form>

                                    <div class="clearfix"></div>

                                </div>
                            </div>
                            <!-- end card-box-->

                        </div>
                        <!-- end wrapper -->

                    </div>
                </div>
            </div>
          </section>
          <!-- END HOME -->

{% endblock content %}
